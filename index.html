<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Footprint | Sustainable Living Blog</title>
    <style>
        /* Modern CSS Variables for easy color changes */
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-gold: #ffb703;
            --text-dark: #1b4332;
            --bg-cream: #f9fbf9;
        }

        body {
            font-family: 'Georgia', serif; /* A more "organic" feel */
            line-height: 1.8;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            background-color: var(--bg-cream);
        }

        /* Header & Hero Section */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        /* Navigation */
        nav {
            background: var(--primary-green);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: bold;
            font-family: sans-serif;
        }

        nav a:hover {
            color: var(--accent-gold);
        }

        /* Main Layout */
        .main-container {
            max-width: 900px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr

</html>
